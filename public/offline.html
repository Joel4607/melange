<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Mélange</title>
  <style>
    :root {
      --cream: #F9F7F2;
      --green: #1F4D37;
      --orange: #E86A33;
      --muted: #7D8A84;
      --white: #FFFFFF;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--cream);
      color: var(--green);
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }
    .card {
      max-width: 22rem;
      background: var(--white);
      border: 1px solid #E5E0D5;
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: 0 4px 20px rgba(31, 77, 55, 0.06);
    }
    h1 { margin: 0; font-size: 1.5rem; }
    p { margin: 1rem 0 0; color: var(--muted); font-size: 0.95rem; line-height: 1.5; }
    a {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      background: var(--green);
      color: var(--cream);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .icon {
      width: 4rem;
      height: 4rem;
      background: var(--orange);
      border-radius: 50%;
      margin: 0 auto 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true"></div>
    <h1>You're offline</h1>
    <p>We can't load Mélange right now. Check your connection and try again.</p>
    <a href="/app" onclick="window.location.reload(); return false;">Try again</a>
  </div>
</body>
</html>
